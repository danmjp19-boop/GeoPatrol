<!DOCTYPE html>
<html>
<head>
    <title>GeoPatrol - Login</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        text-align:center;
        padding:20px;
    }
    .encabezado{
        background:#003366;
        color:white;
        padding:20px;
        border-radius:10px;
        margin:20px auto;
        max-width:700px;
    }
    .card{
        background:white;
        max-width:700px;
        margin:auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    h1{
        margin:0;
        font-size:42px;
    }
    h2{
        font-size:36px;
    }
    input{
        width:90%;
        max-width:500px;
        padding:15px;
        margin:10px;
        font-size:24px;
        border-radius:8px;
        border:1px solid #ccc;
    }
    button{
        width:90%;
        max-width:500px;
        padding:18px;
        margin-top:20px;
        font-size:24px;
        border:none;
        border-radius:10px;
        background:#28a745;
        color:white;
        cursor:pointer;
    }
    #mensaje{
        margin-top:20px;
        font-size:22px;
        color:red;
    }
</style>
</head>
<body>
<div class="encabezado">
    <h1>🚔 GeoPatrol</h1>
</div>
<div class="card">
<h2>Inicio de Sesión</h2>
<input id="cc" type="text" placeholder="Cédula">
<br>
<input id="password" type="password" placeholder="Contraseña">
<br>
<button onclick="login()">
    🔑 Ingresar
</button>
<p id="mensaje"></p>
</div>
<script>
async function login() {
    const cc = document.getElementById("cc").value;
    const password = document.getElementById("password").value;
    try {
        const respuesta = await fetch(
            "https://geopatrol.onrender.com/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    cc: cc,
                    password: password
                })
            }
        );
        const datos = await respuesta.json();
        if(datos.success){
            localStorage.setItem("nombre", datos.nombre);
            localStorage.setItem("cai", datos.cai);
            localStorage.setItem("rol", datos.rol);
            localStorage.setItem("cc", datos.cc);
            if(datos.rol === "admin"){
                window.location.href = "supervisor.html";
            }else{
                window.location.href = "panel.html";
            }
        }else{
            document.getElementById("mensaje").innerHTML =
                datos.mensaje;
        }
    } catch(error){
        document.getElementById("mensaje").innerHTML =
            "Error conectando con el servidor";
    }
}
</script>
</body>
</html>
