<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GeoPatrol - Mapa</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
}

#mapa{
    width:100%;
    height:90vh;
}
</style>

</head>

<body>

<h1>🚔 GeoPatrol</h1>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const mapa = L.map('mapa').setView([4.65,-74.07],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(mapa);

let marcadores = [];

async function cargarGPS(){

    const respuesta = await fetch(
        "https://geopatrol.onrender.com/gps"
    );

    const datos = await respuesta.json();

    marcadores.forEach(m=>mapa.removeLayer(m));
    marcadores=[];

    for(const cc in datos.ubicaciones){

        const gps=datos.ubicaciones[cc];
const iconoPatrulla = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/3048/3048397.png",
    iconSize: [40,40],
    iconAnchor: [20,40],
    popupAnchor: [0,-35]
});

const marcador = L.marker(
    [gps.lat, gps.lon],
    {
        icon: iconoPatrulla
    }
).addTo(mapa);

marcador.bindPopup(
    "<b>🚔 Patrullero</b><br>" +
    "CC: " + cc +
    "<br>Latitud: " + gps.lat +
    "<br>Longitud: " + gps.lon
);
        
        marcadores.push(marcador);
    }

}

cargarGPS();

setInterval(cargarGPS,5000);

</script>

</body>
</html>
