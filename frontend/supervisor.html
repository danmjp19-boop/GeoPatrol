<!DOCTYPE html>
<html>
<head>
    <title>GeoPatrol - Supervisor</title>
</head>
<body>
<h1>Panel Supervisor</h1>
<h2>Crear Usuario</h2>
<input id="cc" type="text" placeholder="Cédula">
<input id="nombre" type="text" placeholder="Nombre completo">
<input id="password" type="password" placeholder="Contraseña">
<input id="cai" type="text" placeholder="CAI">

<select id="rol">
    <option value="patrullero">Patrullero</option>
    <option value="admin">Supervisor</option>
</select>

<br><br>

<button onclick="crearUsuario()">Crear Usuario</button>

<p id="mensaje"></p>
<hr>
<h2>Patrulleros en servicio</h2>
<table border="1">
<tr>
<th>Nombre</th>
<th>CAI</th>
<th>Cuadrantes</th>
<th>Estado</th>
</tr>
<tr>
<td>Juan Pérez</td>
<td>CAI Andes</td>
<td>C-21, C-22</td>
<td>Activo</td>
</tr>
</table>
<br>
<a href="mapa.html">
Ver mapa GPS
</a>
<script>
async function crearUsuario() {

    const cc = document.getElementById("cc").value;
    const nombre = document.getElementById("nombre").value;
    const password = document.getElementById("password").value;
    const cai = document.getElementById("cai").value;
    const rol = document.getElementById("rol").value;

    const respuesta = await fetch(
        "https://geopatrol.onrender.com/crear_usuario",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                cc: cc,
                nombre: nombre,
                password: password,
                cai: cai,
                rol: rol
            })
        }
    );

    const datos = await respuesta.json();

    document.getElementById("mensaje").innerHTML =
        datos.mensaje;
}
</script>
</body>
</html>
